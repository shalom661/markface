services:
  # 1. Banco Redis
  - type: redis
    name: markface-redis
    ipAllowList: [] # Permitir apenas acesso interno por padrão
    plan: free
    maxmemoryPolicy: noeviction

  # 2. Web API (FastAPI)
  - type: web
    name: markface-api
    env: python
    region: ohio # ou outra disponível no free tier
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DATABASE_URL
        sync: false # O usuário deve colar a string do Supabase no painel do Render
      - key: REDIS_URL
        fromService:
          type: redis
          name: markface-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: markface-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: markface-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: APP_SECRET_KEY
        generateValue: true


